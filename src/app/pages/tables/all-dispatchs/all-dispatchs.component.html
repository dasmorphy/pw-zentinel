<p-toast></p-toast>

<div
    class="bg-bluegray-50 mt-header border-round-2xl flex flex-column flex-no-wrap justify-content-center align-items-end">
    
    <div class="bg-white w-12 flex flex-column p-responsive py-5 border-round-md flex-wrap" style="overflow: auto">
        <h1 class="font-verdana text-primary--custom pl-responsive">Total bitácoras</h1>
        <div class="card w-full pd-table" id="table-logbooks">
            <p-table  #dt_dispatchs
                [value]="dataDispatchs"
                [paginator]="true"
                [rows]="5"
                [globalFilterFields]="['workday','truck_license','name_driver', 'shipping_guide', 'observations']"
                [rowsPerPageOptions]="[5, 10, 25, 50]"
                [showCurrentPageReport]="false"
                [tableStyle]="{ 'max-width': '100%' }"
                rowStyleClass="custom-row-height"
                dataKey="id"
            >
                <ng-template pTemplate="caption">
                    
                    <div class="w-full flex justify-content-between align-items-center">
                        <div
                            class="p-inputgroup flex h-3rem p-input-icon-left border-round-2xl w-search-table"
                        >
                            <i style="z-index: 2;" class="pi pi-search text-primary--custom"></i>
                            <input 
                                class="border-none shadow-none--custom border-round-left-2xl border-round-right-2xl" 
                                type="text"
                                pInputText 
                                (input)="dt_dispatchs.filterGlobal($any($event.target).value, 'contains')" 
                            />         
                            <p-columnFilter #imagePanel id="dateFilter" style="position: relative; z-index: 3; right: 3rem; margin-top: 7px;" type="date" field="date" display="menu">
                                <ng-template pTemplate="filter" let-value let-filter="filterCallback">
                                    <div class="flex w-full flex-column gap-3">

                                
                                    </div>
                                </ng-template>
                            </p-columnFilter>
                        </div>

                        <div class="flex gap-2">
                            <p-button label="" icon="pi pi-sync" class="w-reload" (onClick)="reloadDataDispatch()"
                                styleClass="w-full bg-white text-primary--custom b-reload border-round-1xl h-full">
                            </p-button>
                        </div>

                    </div>
                </ng-template>
                <ng-template pTemplate="header">
                    <tr>
                        <th scope="col">Opciones</th>
                        <th scope="col">Fecha</th>
                        <th scope="col">Orden</th>
                        <th scope="col">Conductor</th>
                        <th scope="col">Placa</th>
                        <!-- <th scope="col">Permanencia</th> -->
                        <th scope="col">Estado</th>
                    </tr>
                </ng-template>                
                <ng-template pTemplate="body" let-dispatch>
                    <tr>                
                        <td data-titulo="Opciones:">
                            <p-splitButton id="option-table" appendTo="body" (click)="optionsDispatch(dispatch)" [model]="items">
                                <ng-template pTemplate="dropdownicon">
                                    <i class="pi pi-ellipsis-h" style="color: #83378f;"></i>
                                </ng-template>
                            </p-splitButton>
                        </td>
                        <td  data-titulo="Fecha:" [ngxTippy]="'Hora de registro: ' + (dispatch?.created_at | date:'HH:mm':'UTC')">{{ dispatch?.created_at | date:'dd/MM/yyyy':'UTC' }}</td>
                        <td  data-titulo="Orden:">{{ dispatch?.order_number ?? 'N/A' }}</td>
                        <td  data-titulo="Conductor:">{{ dispatch?.driver }}</td>
                        <td  data-titulo="Placa:">{{ dispatch?.truck_license ?? 'N/A' }}</td>
                        <!-- <td  data-titulo="Permanencia:" style="width: 20px;">{{ loogbook?.permanence_time ?? 'N/A' }}</td> -->
                        <td  data-titulo="Estado:">
                            <p-tag [value]="dispatch?.status" [severity]="getSeverity(dispatch?.status)"></p-tag>
                        </td>
                    </tr>
                </ng-template>
                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="11" class="text-center" style="font-size: 18px; font-weight: 700;">No hay datos disponibles</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>

<div class="overlay" *ngIf="isLoading">
    <p-progressSpinner
      class="center-spinner"
      [style]="{ width: '50px', height: '50px' }"
      strokeWidth="8"
      fill="#007bff"
      animationDuration="2s"
    ></p-progressSpinner>
</div>
