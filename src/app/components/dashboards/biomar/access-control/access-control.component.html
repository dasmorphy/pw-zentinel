<div class="flex flex-column w-full px-5">
    <div class="flex w-full justify-content-center gap-3 indicators" >
        <div class="flex card-info justify-content-between align-items-center"  style="width: 19rem; height: 10rem;">
            <div class="flex bg-white border-circle justify-content-center align-items-center" style="height: 5rem; width: 5rem;">
                <i class="pi pi-megaphone" style="font-size: 45px; color: rgb(6 92 141);"></i>
            </div>
            <div class="flex flex-column" style="max-width: 90px;">
                <span style="font-weight: 600;">Total Accesos</span>
                <span style="color: black; font-weight: 600; font-size: 28px;">{{graphEntryStatus?.[2]?.count}}</span>
            </div>
        </div>


        <div class="flex card-info justify-content-between align-items-center"  style="width: 19rem; height: 10rem;">
            <div class="flex bg-white border-circle justify-content-center align-items-center" style="height: 5rem; width: 5rem;">
                <i class="pi pi-megaphone" style="font-size: 45px; color: rgb(6 92 141);"></i>
            </div>
            <div class="flex flex-column" style="max-width: 90px;">
                <span style="font-weight: 600;">Pendientes de salida</span>
                <span style="color: black; font-weight: 600; font-size: 28px;">{{graphEntryStatus?.[1]?.count}}</span>
            </div>
        </div>

        <div class="flex card-info justify-content-between align-items-center"  style="width: 19rem; height: 10rem;">
            <div class="flex bg-white border-circle justify-content-center align-items-center" style="height: 5rem; width: 5rem;">
                <i class="pi pi-megaphone" style="font-size: 45px; color: rgb(6 92 141);"></i>
            </div>
            <div class="flex flex-column" style="max-width: 90px;">
                <span style="font-weight: 600;">Proveedores</span>
                <span style="color: black; font-weight: 600; font-size: 28px;">{{graphCountTypeAccess?.[0]?.count}}</span>
            </div>
        </div>


        <div class="flex card-info justify-content-between align-items-center"  style="width: 19rem; height: 10rem;">
            <div class="flex bg-white border-circle justify-content-center align-items-center" style="height: 5rem; width: 5rem;">
                <i class="pi pi-megaphone" style="font-size: 45px; color: rgb(6 92 141);"></i>
            </div>
            <div class="flex flex-column" style="max-width: 90px;">
                <span style="font-weight: 600;">Visitantes</span>
                <span style="color: black; font-weight: 600; font-size: 28px;">{{graphCountTypeAccess?.[1]?.count}}</span>
            </div>
        </div>

    </div>


    <div class="flex w-full justify-content-center gap-3" >
        <div class="flex card-info justify-content-between align-items-center"  style="width: 19rem; height: 10rem;">
            <div class="flex flex-column" style="max-width: 90px;">
                <span style="font-weight: 600;">Proveedores vs Visitantes</span>
                <canvas class="dona" id="myDoughnutChart"></canvas>
            </div>
        </div>
    </div>

    
</div>
