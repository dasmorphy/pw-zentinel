<div class="flex flex-column card-info mt-3 gap-2">

    <div class="flex flex-column">
        <label class="font-bold cab-label" htmlFor="shipping_guide">GUÍA: </label>
        <label style="font-size: 23px;" class="font-bold" htmlFor="shipping_guide">
            {{ logbookData?.shipping_guide || "N/A" }}
        </label>
    </div>

    <div class="flex align-items-center ">
        <i style="font-size: 0.8rem;" class="pi pi-calendar mr-2"></i>

        <label htmlFor="shipping_guide">
            {{ logbookData?.created_at | date:'dd/MM/yyyy':'UTC'}}
        </label>

        <i class="pi pi-clock mr-2 ml-2" style="font-size: 0.8rem;"></i>

        <label htmlFor="shipping_guide">
            {{ logbookData?.created_at | date:'HH:mm':'UTC'}}
        </label>
    </div>

</div>

<h4>INFORMACIÓN DE CARGA</h4>
<div class="div-responsive mt-4 gap-2">
    <div class="flex flex-column w-full card-info">
        <i class="pi pi-map-marker mb-3" style="color: #0056b3;"></i>
        <label class="font-bold cab-label" htmlFor="shipping_guide">LOCALIDAD: </label>
        <label class="det-label"  htmlFor="shipping_guide">{{logbookData?.group_name}}</label>
    </div>

    <div class="flex flex-column w-full card-info">
        <i class="pi pi-map mb-3" style="color: #0056b3;"></i>
        <label class="font-bold cab-label" htmlFor="shipping_guide">COORDENADAS: </label>
        <label class="det-label"  htmlFor="shipping_guide">{{logbookData?.lat}},{{logbookData?.long}}</label>
    </div>

    <div class="flex flex-column w-full card-info">
        <i class="pi pi-objects-column mb-3" style="color: #0056b3;"></i>
        <label class="font-bold cab-label" htmlFor="shipping_guide">CATEGORÍA: </label>
        <label class="det-label"  htmlFor="shipping_guide">{{logbookData?.name_category}}</label>
    </div>

    <div class="flex flex-column w-full card-info">
        <i class="pi pi-truck mb-3" style="color: #0056b3;"></i>
        <label class="font-bold cab-label" htmlFor="shipping_guide">PLACA VEHÍCULO: </label>
        <label class="det-label"  htmlFor="shipping_guide">{{logbookData?.truck_license}}</label>
    </div>

    <div class="flex flex-column w-full card-info">
        <i class="pi pi-hammer mb-3" style="color: #0056b3;"></i>
        <label class="font-bold cab-label" htmlFor="shipping_guide">CANTIDAD: </label>
        <label class="det-label"  htmlFor="shipping_guide">{{logbookData?.quantity ?? 'N/A'}}</label>
    </div>

    <div class="flex flex-column w-full card-info">
        <i class="pi pi-shopping-bag mb-3" style="color: #0056b3;"></i>
        <label class="font-bold cab-label" htmlFor="shipping_guide">PESO: </label>
        <label class="det-label"  htmlFor="shipping_guide">{{logbookData?.weight ?? 'N/A'}}</label>
    </div>

    <div class="flex flex-column w-full card-info">
        <i class="pi pi-shopping-bag mb-3" style="color: #0056b3;"></i>
        <label class="font-bold cab-label" htmlFor="shipping_guide">DESTINO: </label>
        <label class="det-label"  htmlFor="shipping_guide">
            {{logbookData?.destiny_intern ?? logbookData?.destiny}}
        </label>
    </div>
</div>

<h4>PERSONAL RESPONSABLE</h4>
<div class="flex flex-column card-info mt-4 gap-2">
    
    <div class="flex gap-2 w-full">
        <div class="det-avatar">
            <i class="pi pi-user-edit" style="color: #0056b3;"></i>
        </div>
        <div class="flex flex-column">
            <label class="font-bold cab-label" htmlFor="shipping_guide">CREADO POR: </label>
            <label class="det-label"  htmlFor="shipping_guide">{{logbookData?.created_by}}</label>
        </div>
    </div>

    <div class="flex gap-2 w-full">
        <div class="det-avatar">
            <i class="pi pi-user" style="color: #0056b3;"></i>
        </div>
        <div class="flex flex-column">
            <label class="font-bold cab-label" htmlFor="shipping_guide">GUARDIA: </label>
            <label class="det-label"  htmlFor="shipping_guide">{{logbookData?.name_user}}</label>
        </div>
    </div>

    <div class="flex gap-2 w-full">
        <div class="det-avatar">
            <i class="pi pi-car" style="color: #0056b3;"></i>
        </div>
        <div class="flex flex-column">
            <label class="font-bold cab-label" htmlFor="shipping_guide">CONDUCTOR: </label>
            <label class="det-label"  htmlFor="shipping_guide">{{logbookData?.name_driver}}</label>
        </div>
    </div>

    <!-- <span class="w-full mt-1">
        <label class="font-semibold" htmlFor="shipping_guide">Decripción: </label>
        <label htmlFor="shipping_guide">{{logbookData?.description}}</label>
    </span>

    <span class="w-full mt-1">
        <label class="font-semibold" htmlFor="shipping_guide">Proveedor: </label>
        <label htmlFor="shipping_guide">{{logbookData?.provider ?? 'N/A'}}</label>
    </span> -->

</div>

<h4>OBSERVACIONES</h4>
<div class="flex flex-column card-info mt-3 gap-2">
    <label class="det-label" htmlFor="shipping_guide">{{ !logbookData?.observations || logbookData?.observations
        === '' ? 'N/A' : logbookData?.observations }}</label>
</div>




@if (logbookData?.images_entry?.length > 0) {
    <h4 class="mt-4">IMÁGENES</h4>
    <div class="div-responsive mt-3">
        <div class="flex justify-content-center" *ngFor="let image of logbookData?.images_entry">
            <img style="object-fit: contain; border-radius: 1rem;" [src]="'http://st.telearseg.net' + image" alt="imagenes ingreso"
                loading="lazy" height="190" width="180">
        </div>
    </div>
}
