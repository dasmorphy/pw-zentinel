@if (modalDetailsGraphs) {
<app-logbook-details-graphs [filtersLogbook]="filters"
  (close)="modalDetailsGraphs = false"></app-logbook-details-graphs>
}

<div class="px-5 flex flex-column">
  <div>
    <i class="pi pi-filter cursor-pointer" (click)="imagePanel.toggle($event)"></i>
    <p-overlayPanel #imagePanel [dismissable]="true" [style]="{ width: '320px' }">
      <div class="flex w-full flex-column gap-3">
        <p-dropdown [style]="{ boxShadow: 'none' }" styleClass="border-round w-full" id="cuentaCliente"
          [options]="optionFilterCategory" optionLabel="label" optionValue="value" (onChange)="onFilterChange($event)">
        </p-dropdown>

        @if (user_session?.role == "admin" || user_session?.role == "admin_tlsg") {
        <p-multiSelect [style]="{ boxShadow: 'none' }" styleClass="border-round w-full" id="optionSector"
          [options]="optionSector" [(ngModel)]="selectedSector" optionLabel="name" optionValue="id_sector"
          placeholder="Seleccione una opción"></p-multiSelect>
        }

        @if (!user_permissions_signal().includes('DATA_BY_GROUP_BUSINESS')) {
        <p-multiSelect [style]="{ boxShadow: 'none' }" styleClass="border-round w-full" id="optionGroupBusiness"
          [options]="optionGroupBusiness" [(ngModel)]="selectedGroupBusiness" optionLabel="name"
          optionValue="id_group_business" placeholder="Seleccione una opción"></p-multiSelect>
        }

        <p-multiSelect [style]="{ boxShadow: 'none' }" styleClass="border-round w-full" id="optionGroupBusiness"
          [options]="optionTime" [(ngModel)]="selectedTime" placeholder="Seleccione una opción"></p-multiSelect>

        <p-calendar [(ngModel)]="dateRange" selectionMode="range" dateFormat="dd/mm/yy" [showIcon]="true"
          [readonlyInput]="true" placeholder="Rango de fechas" [style]="{ boxShadow: 'none' }"
          styleClass="border-round w-full">
        </p-calendar>
      </div>

      <div class="flex justify-content-center gap-3 mt-4">
        <p-button label="Aplicar" icon="pi pi-filter-fill" size="small" (onClick)="onFilterDate(imagePanel)">
        </p-button>

        <p-button label="Limpiar" icon="pi pi-filter-slash" size="small" (onClick)="imagePanel.hide()">
        </p-button>

      </div>

    </p-overlayPanel>
  </div>

  <div class="flex w-full gap-3 mt-3 column-responsive">
    <div class="flex card-info justify-content-center align-items-center w-full shadow-1" style="height: 20rem;">
      <div class="flex flex-column h-full w-full">
        <span style="font-weight: 600;">Bitácoras</span>
        <div class="flex align-items-center h-full p-3">
          <canvas id="myDoughnutChart"></canvas>
        </div>
      </div>
    </div>

    <div class="flex card-info justify-content-center align-items-center w-full shadow-1" style="height: 20rem;">
      <div class="flex flex-column h-full w-full">
        <span style="font-weight: 600;">Personal interno</span>
        <div class="flex flex-column w-full h-full justify-content-center">
          <div class="flex flex-column">
            <span class="mt-3 text-sm" style="font-weight: 600;">Ingreso</span>
            <p-progressBar class="mt-2" id="check-in-bar" [value]="valueProgressBar('check_in')">
            </p-progressBar>
          </div>

          <div class="flex flex-column">
            <span class="mt-3 text-sm" style="font-weight: 600;">Movimiento entre sector</span>
            <p-progressBar class="mt-2" id="transfer-bar" [value]="valueProgressBar('transfer')">
            </p-progressBar>
          </div>

          <div class="flex flex-column">
            <span class="mt-3 text-sm" style="font-weight: 600;">Salida</span>
            <p-progressBar class="mt-2" id="check-out-bar" [value]="valueProgressBar('check_out')">
            </p-progressBar>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="flex w-full gap-3 mt-5 column-responsive">
    <div class="flex card-info justify-content-center align-items-center w-full shadow-1" style="height: 29rem;">
      <div class="flex flex-column h-full w-full">
        <span style="font-weight: 600;">Cantidad Categorías</span>
        <div class="flex w-full align-items-center justify-content-center mt-3">
          <app-polar-chart [filters]="filters" [dataPolar]="dataCategoryQuantity"></app-polar-chart>
        </div>

      </div>
    </div>

    <div class="flex card-info justify-content-center align-items-center w-full shadow-1" style="height: 29rem;">
      <div class="flex flex-column h-full w-full">
        <span style="font-weight: 600;">Total por categoría</span>
        <div class="flex align-items-center h-full">
          <canvas id="categoryChart"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>
