<p-toast></p-toast>


<div class="congress-page">
    <div class="content-wrapper" style="margin-top: 6rem;">
        <!-- Form Section -->
        <div class="form-card">
            <h2 class="form-title">REGISTRO</h2>

            <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()" class="registration-form">

                <!-- Row 1: Nombre / Apellidos -->
                <div class="p-fluid p-formgrid">
                    <div class="form-row">
                        <div class="form-col">
                            <label class="field-label">Nombre Completos<span class="required">*</span></label>
                            <input pInputText formControlName="names" placeholder="Nombres completos"
                                class="p-inputtext-sm custom-input" />
                        </div>
                    </div>

                    <!-- Row 2: E-mail / Teléfono -->
                    <div class="form-row">
                        <div class="form-col">
                            <label class="field-label">E-mail <span class="required">*</span></label>
                            <input pInputText formControlName="email" placeholder="E-mail" type="email"
                                class="p-inputtext-sm custom-input" />
                            <div *ngIf="registrationForm.get('email')?.hasError('pattern')">
                                <span class="validate-data font-bold">El formato de correo electrónico es inválido</span>
                            </div>
                        </div>
                        <div class="form-col">
                            <label class="field-label">Empresa <span class="required">*</span></label>
                            <input pInputText formControlName="business" placeholder="Nombre de la empresa"
                                class="p-inputtext-sm custom-input" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-col">
                            <label class="field-label">Cargo <span class="required">*</span></label>
                            <input pInputText formControlName="position" placeholder="Cargo"
                                class="p-inputtext-sm custom-input" />
                            <div *ngIf="registrationForm.get('position')?.hasError('campoVacio')">
                                <span class="validate-data">Este campo es obligatorio</span>
                            </div>
                        </div>
                        <div class="form-col">
                            <label class="field-label">Teléfono <span class="required">*</span></label>
                            <input pInputText formControlName="phone" placeholder="Telefono"
                                class="p-inputtext-sm custom-input" maxlength="10" oninput="this.value = this.value.replace(/\D/g, '');" />
                            <div *ngIf="registrationForm.get('phone')?.hasError('campoVacio')">
                                <span class="validate-data">Este campo es obligatorio</span>
                            </div>
                        </div>
                    </div>

                    <!-- Row 3: País / Nacionalidad -->
                    <div class="form-row">
                        <div class="form-col">
                            <label class="field-label">Comentarios <span class="required">*</span></label>
                            <input pInputText formControlName="interested" placeholder="Comentarios"
                                class="p-inputtext-sm custom-input" />
                            <div *ngIf="registrationForm.get('interested')?.hasError('campoVacio')">
                                <span class="validate-data">Este campo es obligatorio</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="submit-section">
                    <button pButton type="submit" label="Enviar" class="submit-btn"></button>
                </div>

            </form>
        </div>

    </div>
</div>
